<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Health_Assistant_Flutter">
  <meta name="theme-color" content="#F3F7FB">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="luminous">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>luminous</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #F3F7FB;
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #app-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f7fbff 0%, #f3f7fb 100%);
      z-index: 9999;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    #app-splash.app-splash--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-splash__card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #0f172a;
    }

    .app-splash__logo {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }

    .app-splash__title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .app-splash__subtitle {
      font-size: 14px;
      color: #64748b;
      font-weight: 600;
    }

    .app-splash__loader {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid rgba(14, 165, 233, 0.14);
      border-top-color: #0ea5e9;
      animation: appSplashSpin 0.9s linear infinite;
    }

    @keyframes appSplashSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app-splash">
    <div class="app-splash__card">
      <img class="app-splash__logo" src="icons/Icon-192.png" alt="Luminous logo">
      <div class="app-splash__title">Luminous</div>
      <div class="app-splash__subtitle">健康助手启动中...</div>
      <div class="app-splash__loader" aria-hidden="true"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
