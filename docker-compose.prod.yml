name: luminous-prod

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: luminous-nginx
    restart: unless-stopped
    depends_on:
      - app-backend
      - site-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/luminous.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./deploy/certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - ./site-frontend/dist:/usr/share/nginx/html:ro
      - ./ppt:/usr/share/nginx/ppt:ro

  app-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luminous-app-backend
    restart: unless-stopped
    env_file:
      - ./deploy/env/.env.app-backend.production
    expose:
      - "8787"
    depends_on:
      - mongodb
      - redis
      - mysql

  site-backend:
    build:
      context: ./site-backend
      dockerfile: Dockerfile
    container_name: luminous-site-backend
    restart: unless-stopped
    env_file:
      - ./deploy/env/.env.site-backend.production
    expose:
      - "3030"

  mongodb:
    image: mongo:7
    container_name: luminous-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: luminous-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.0
    container_name: luminous-mysql
    restart: unless-stopped
    env_file:
      - ./deploy/env/.env.app-backend.production
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mongodb_data:
  redis_data:
  mysql_data:
