services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - ./backend/.env.development
    depends_on:
      - mongodb
      - redis
      - mysql
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
    volumes:
      - "D:/25080/DockerTest/mysql-data:/var/lib/mysql"
    restart: unless-stopped
